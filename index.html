<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>umo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── VIDEO FONDO ── */
  .yt-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #000;
  }

  .yt-bg iframe {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 56.25vw;
    min-height: 100vh;
    min-width: 177.78vh;
    pointer-events: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1;
  }

  /* ── NAV ── */
  nav {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 52px;
  }

  .nav-logo a {
    display: flex;
    align-items: center;
    text-decoration: none;
  }

  .nav-logo img {
    height: 22px;
    width: auto;
    mix-blend-mode: screen;
  }

  .nav-logo-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: white;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 44px;
    list-style: none;
  }

  .nav-links li a {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    transition: color 0.25s;
  }

  .nav-links li a:hover {
    color: #fff;
  }

  /* ── HAMBURGUESA ── */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 0;
    background: none;
    border: none;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    z-index: 200;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: white;
    transition: transform 0.3s ease, opacity 0.3s ease;
    transform-origin: center;
  }
  .hamburger.active span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* ── CATEGORÍAS ── */
  .home-categories {
    position: absolute;
    bottom: 48px;
    left: 52px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .home-categories a {
    font-size: clamp(28px, 4.5vw, 64px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.08;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.25s ease;
    display: block;
  }

  .home-categories a:hover {
    color: #fff;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    nav { padding: 24px 24px; }

    .nav-links {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.97);
      backdrop-filter: blur(16px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      z-index: 150;
    }
    .nav-links.open { display: flex; }
    .nav-links li a { font-size: 13px; letter-spacing: 0.2em; }
    .hamburger { display: flex; position: relative; z-index: 200; }

    .home-categories {
      left: 24px;
      bottom: 40px;
    }

    .home-categories a {
      font-size: clamp(22px, 7vw, 36px);
    }
  }
</style>
</head>
<body>

<section class="hero">

  <div class="yt-bg">
    <iframe
      src="https://www.youtube.com/embed/Gx3Q5BXLCGU?autoplay=1&mute=1&loop=1&playlist=Gx3Q5BXLCGU&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=1"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <div class="overlay"></div>

  <nav>
    <div class="nav-logo">
      <a href="index.html">
        <img src="Identidad-Umo-Blanco__1_.png" alt="umo"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="nav-logo-text" style="display:none">umo</span>
      </a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="nosotros.html">Nosotros</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <div class="home-categories">
    <a href="umo-videoclips.html">Videoclips</a>
    <a href="umo-shows.html">Shows en vivo</a>
    <a href="umo-publicidad.html">Marketing de experiencias</a>
  </div>

</section>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    navLinks.classList.toggle('open');
  });
  navLinks.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      hamburger.classList.remove('active');
      navLinks.classList.remove('open');
    });
  });
</script>

</body>
</html>
