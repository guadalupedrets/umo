<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>umo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    background: #000;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── VIDEO FONDO ── */
  .yt-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #000;
  }

  .yt-bg iframe {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 56.25vw;
    min-height: 100vh;
    min-width: 177.78vh;
    pointer-events: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1;
  }

  /* ── INTRO ── */
  .intro {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease;
  }

  .intro.hide {
    opacity: 0;
    pointer-events: none;
  }

  .intro-logo {
    width: 200px;
    height: auto;
    mix-blend-mode: screen;
    animation: introPulse 0.8s ease forwards;
    opacity: 0;
  }

  .intro-logo-text {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: white;
    animation: introPulse 0.8s ease forwards;
    opacity: 0;
  }

  @keyframes introPulse {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── ANIMACIONES DE ENTRADA ── */
  nav, .home-categories {
    opacity: 0;
    transform: translateY(18px);
  }

  nav.visible {
    animation: slideUp 0.7s ease forwards;
  }

  .home-categories.visible {
    animation: slideUp 0.7s ease 0.15s forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── NAV ── */
  nav {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 52px;
  }

  .nav-logo a {
    display: flex;
    align-items: center;
    text-decoration: none;
  }

  .nav-logo img {
    height: 22px;
    width: auto;
    mix-blend-mode: screen;
  }

  .nav-logo-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: white;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 44px;
    list-style: none;
  }

  .nav-links li a {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    transition: color 0.25s;
  }

  .nav-links li a:hover {
    color: #fff;
  }

  /* ── DROPDOWN ── */
  .nav-dropdown {
    position: relative;
    display: flex;
    align-items: center;
    line-height: 1;
  }

  .nav-dropdown > a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    line-height: 1;
    vertical-align: middle;
  }

  .nav-dropdown > a::after {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-right: 1px solid rgba(255,255,255,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.4);
    transform: rotate(45deg);
    position: relative;
    top: -2px;
    transition: transform 0.2s, border-color 0.25s;
  }
  .nav-dropdown:hover > a::after,
  .nav-dropdown.open > a::after {
    transform: rotate(-135deg);
    top: 2px;
    border-color: white;
  }

  .dropdown-menu {
    position: absolute;
    top: 100%; right: 0;
    padding-top: 20px;
    background: transparent;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .nav-dropdown:hover .dropdown-menu,
  .nav-dropdown.open .dropdown-menu {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  .dropdown-menu-inner {
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 200px;
    padding: 8px 0;
  }

  .dropdown-menu a {
    display: block;
    padding: 12px 24px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  .dropdown-menu a:hover {
    color: white;
    background: rgba(255,255,255,0.04);
  }

  /* ── HAMBURGUESA ── */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 0;
    background: none;
    border: none;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    z-index: 200;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: white;
    transition: transform 0.3s ease, opacity 0.3s ease;
    transform-origin: center;
  }
  .hamburger.active span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* ── CATEGORÍAS ── */
  .home-categories {
    position: absolute;
    bottom: 48px;
    left: 52px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .home-categories a {
    font-size: clamp(23px, 4vw, 59px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.08;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.4s ease, transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    display: block;
    transform-origin: left center;
  }

  .home-categories a:hover {
    color: #fff;
    transform: scale(1.08);
  }

  html {
    scroll-behavior: smooth;
    overflow-x: hidden;
  }

  body {
    width: 100%;
    background: #000;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  /* ── SECCIÓN DESCRIPCIÓN ── */
  .about-section {
    background: #fff;
    padding: 120px 52px;
    display: flex;
    justify-content: flex-end;
  }

  .about-text {
    font-size: 25px;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: -0.01em;
    color: #000;
    max-width: 600px;
    display: block;
  }

  @media (max-width: 768px) {
    .about-section { padding: 80px 24px; }
    .about-text { font-size: 20px; }
  }
  @media (max-width: 768px) {
    nav { padding: 24px 24px; }

    .nav-links {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.97);
      backdrop-filter: blur(16px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      z-index: 150;
    }
    .nav-links.open { display: flex; }
    .nav-links li a { font-size: 13px; letter-spacing: 0.2em; }
    .hamburger { display: flex; position: relative; z-index: 200; }

    .nav-dropdown { flex-direction: column; align-items: center; }
    .nav-dropdown > a::after { display: none; }
    .dropdown-menu { position: static; opacity: 1; pointer-events: all; transform: none; background: transparent; padding: 12px 0 0; display: none; text-align: center; }
    .dropdown-menu-inner { background: transparent; border: none; padding: 0; }
    .nav-dropdown.open .dropdown-menu { display: block; }
    .dropdown-menu a { color: rgba(255,255,255,0.35) !important; padding: 8px 0 !important; }

    .home-categories {
      left: 24px;
      bottom: 40px;
    }

    .home-categories a {
      font-size: clamp(22px, 7vw, 36px);
    }
  }
</style>
</head>
<body>

<div class="intro" id="intro">
  <img class="intro-logo" src="Identidad-Umo-Blanco__1_.png" alt="umo"
       onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
  <span class="intro-logo-text" style="display:none">umo</span>
</div>

<section class="hero">

  <div class="yt-bg">
    <iframe
      src="https://www.youtube.com/embed/Gx3Q5BXLCGU?autoplay=1&mute=1&loop=1&playlist=Gx3Q5BXLCGU&controls=0&showinfo=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=1"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <div class="overlay"></div>

  <nav>
    <div class="nav-logo">
      <a href="index.html">
        <img src="Identidad-Umo-Blanco__1_.png" alt="umo"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="nav-logo-text" style="display:none">umo</span>
      </a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li class="nav-dropdown" id="dirDropdown">
        <a href="#" onclick="return false;">Directores</a>
        <div class="dropdown-menu">
          <div class="dropdown-menu-inner">
            <a href="director-alan-olmedo.html">Alan Olmedo</a>
            <a href="director-nombre-prueba.html">Nombre de Prueba</a>
          </div>
        </div>
      </li>
      <li><a href="nosotros.html">Nosotros</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <div class="home-categories">
    <a href="umo-videoclips.html">Videoclips</a>
    <a href="umo-shows.html">Shows en vivo</a>
    <a href="umo-publicidad.html">Marketing de experiencias</a>
  </div>

</section>

<section class="about-section">
  <p class="about-text">Producción audiovisual y shows en vivo de gran impacto, desde el desarrollo de la idea hasta su ejecución.</p>
</section>

<script>
  // Intro → home
  const intro = document.getElementById('intro');
  const nav = document.querySelector('nav');
  const categories = document.querySelector('.home-categories');

  setTimeout(() => {
    intro.classList.add('hide');
    setTimeout(() => {
      intro.style.display = 'none';
      nav.classList.add('visible');
      categories.classList.add('visible');
    }, 800);
  }, 1800);

  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    navLinks.classList.toggle('open');
  });

  const dropdowns = document.querySelectorAll('.nav-dropdown');
  dropdowns.forEach(dd => {
    dd.querySelector('a').addEventListener('click', (e) => {
      e.preventDefault();
      if (window.innerWidth <= 768) dd.classList.toggle('open');
    });
  });

  navLinks.querySelectorAll('li:not(.nav-dropdown) a').forEach(a => {
    a.addEventListener('click', () => {
      hamburger.classList.remove('active');
      navLinks.classList.remove('open');
    });
  });

  document.addEventListener('click', (e) => {
    if (window.innerWidth > 768) {
      dropdowns.forEach(dd => {
        if (!dd.contains(e.target)) dd.classList.remove('open');
      });
    }
  });
</script>

</body>
</html>
